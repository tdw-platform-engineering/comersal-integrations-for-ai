[project]
name = "comersal-shared"
version = "0.1.0"
description = "Shared DB connection and domain models for Comersal integrations"
requires-python = ">=3.13"
dependencies = ["pymssql>=2.2.11"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
